spring.application.name=WebPhimApi
server.port=${SERVER_PORT:8080}

spring.datasource.url=jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:webphim}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Ho_Chi_Minh
spring.datasource.username=${DB_USER:root}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

spring.data.redis.host=${REDIS_HOST:127.0.0.1}
spring.data.redis.port=${REDIS_PORT:6380}
spring.data.redis.password=${REDIS_PASSWORD:}
spring.data.redis.repositories.enabled=false

webphim.jwt.secret=${JWT_SECRET:change-this-development-secret-change-this-development-secret}
webphim.jwt.issuer=${JWT_ISSUER:WebPhimApi}
webphim.jwt.audience=${JWT_AUDIENCE:WebPhimClient}
webphim.jwt.expiration-days=${JWT_EXPIRATION_DAYS:7}
webphim.sepay-webhook-secret=${SEPAY_WEBHOOK_SECRET:}
webphim.cors.allowed-origins=http://localhost:5173,http://localhost:5174,http://127.0.0.1:5173,http://127.0.0.1:5174,http://localhost:3000,https://backe-live.hanhfine.id.vn,https://hanh.hanhfine.id.vn,https://webphim.hanhfine.id.vn,https://www.dxhiep.id.vn
